# --- HTTP server ---
# This starts as HTTP-only so certbot's HTTP-01 challenge can succeed on first run.
# After running certbot (see README), uncomment the HTTPS server block below and
# add a redirect from this block to https.

server {
    listen 80;
    server_name _;   # replace with your actual domain, e.g. knowledge.yourcompany.com

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;   # allow reasonably large document uploads
        proxy_read_timeout 120s;    # embedding/rerank can take a moment on first load
    }

    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
    }
}

